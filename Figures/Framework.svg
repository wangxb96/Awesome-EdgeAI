<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs>
    <linearGradient id="bgg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="dataG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="modelG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="systemG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="largeG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="agentG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="850" fill="url(#bgg)"/>
  
  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">Edge AI — Unified Taxonomy</text>
  <text x="600" y="78" text-anchor="middle" fill="#94a3b8" font-size="13">From Data &amp; Model Optimization to LLM, Agents &amp; Cognitive Systems — Five Interconnected Pillars</text>

  <!-- Pillar 1: Data -->
  <rect x="30" y="120" width="215" height="660" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="120" width="215" height="50" rx="14" fill="url(#dataG)"/>
  <rect x="30" y="155" width="215" height="15" fill="url(#dataG)"/>
  <text x="137" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700"> Data</text>
  
  <text x="50" y="200" fill="#93c5fd" font-size="12" font-weight="600">Federated Learning</text>
  <text x="50" y="225" fill="#cbd5e1" font-size="10">· Horizontal / Vertical FL</text>
  <text x="50" y="245" fill="#cbd5e1" font-size="10">· Split Learning</text>
  <text x="50" y="265" fill="#cbd5e1" font-size="10">· Personalization</text>
  
  <text x="50" y="305" fill="#93c5fd" font-size="12" font-weight="600">Synthetic &amp; Augmentation</text>
  <text x="50" y="330" fill="#cbd5e1" font-size="10">· Data Distillation</text>
  <text x="50" y="350" fill="#cbd5e1" font-size="10">· Generative Aug</text>
  <text x="50" y="370" fill="#cbd5e1" font-size="10">· Domain Adaptation</text>

  <text x="50" y="410" fill="#93c5fd" font-size="12" font-weight="600">Compressed Sensing</text>
  <text x="50" y="435" fill="#cbd5e1" font-size="10">· Feature Compression</text>
  <text x="50" y="455" fill="#cbd5e1" font-size="10">· Early Exit Sampling</text>

  <text x="50" y="500" fill="#93c5fd" font-size="12" font-weight="600">On-Device Data</text>
  <text x="50" y="525" fill="#cbd5e1" font-size="10">· Smart Caching</text>
  <text x="50" y="545" fill="#cbd5e1" font-size="10">· Streaming ETL</text>
  <text x="50" y="565" fill="#cbd5e1" font-size="10">· TinyML Signals</text>

  <text x="50" y="610" fill="#93c5fd" font-size="12" font-weight="600">Data Quality &amp; Annotation</text>
  <text x="50" y="635" fill="#cbd5e1" font-size="10">· Weak Supervision</text>
  <text x="50" y="655" fill="#cbd5e1" font-size="10">· Self-Supervised</text>

  <text x="50" y="700" fill="#93c5fd" font-size="12" font-weight="600">Benchmarks &amp; Datasets</text>
  <text x="50" y="725" fill="#cbd5e1" font-size="10">· CIFAR-10/100 · ImageNet</text>
  <text x="50" y="745" fill="#cbd5e1" font-size="10">· Speech Commands</text>
  <text x="50" y="765" fill="#cbd5e1" font-size="10">· WMT · GLUE · OpenOrca</text>

