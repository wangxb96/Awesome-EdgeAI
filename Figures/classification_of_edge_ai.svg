  <rect width="1100" height="750" fill="url(#bg)"/>
  <text x="550" y="45" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Classification of Edge AI</text>
  <text x="550" y="75" text-anchor="middle" fill="#94a3b8" font-size="13">Three dimensions: Architecture, Optimization Target, Application Domain</text>

