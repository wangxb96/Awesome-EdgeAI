<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="side" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  
  <text x="600" y="50" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Cognitive Edge AI — Unified Architecture</text>
  <text x="600" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">Five-Layer Stack for Pervasive Edge Intelligence (2023–2026)</text>

  <!-- Sidebar -->
  <rect x="20" y="110" width="200" height="730" rx="12" fill="url(#side)" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="145" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Cross-cutting</text>
  
  <rect x="35" y="165" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="196" text-anchor="middle" fill="#94a3b8" font-size="13">Security &amp; Privacy</text>
  
  <rect x="35" y="230" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="261" text-anchor="middle" fill="#94a3b8" font-size="13">Benchmarks &amp; Datasets</text>
  
  <rect x="35" y="295" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="326" text-anchor="middle" fill="#94a3b8" font-size="13">Data Pipeline</text>
  
  <rect x="35" y="360" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="391" text-anchor="middle" fill="#94a3b8" font-size="13">Feedback Loops</text>
  
  <rect x="35" y="425" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="456" text-anchor="middle" fill="#94a3b8" font-size="13">Energy Efficiency</text>
  
  <rect x="35" y="490" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="521" text-anchor="middle" fill="#94a3b8" font-size="13">Deployment/Monitoring</text>
  
  <rect x="35" y="555" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="586" text-anchor="middle" fill="#94a3b8" font-size="13">Edge-Cloud Sync</text>
  
  <rect x="35" y="620" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="651" text-anchor="middle" fill="#94a3b8" font-size="13">Networking (6G/5G)</text>

  <rect x="35" y="685" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="716" text-anchor="middle" fill="#94a3b8" font-size="13">Standardization</text>
  
  <rect x="35" y="750" width="170" height="50" rx="8" fill="#1e293b"/>
  <text x="120" y="781" text-anchor="middle" fill="#94a3b8" font-size="13">HCI / UX</text>

  <!-- Layer 5: Applications -->
  <rect x="245" y="110" width="935" height="130" rx="12" fill="url(#layer5)" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="712" y="148" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Layer 5 — Applications &amp; Use Cases</text>
  <text x="712" y="176" text-anchor="middle" fill="#eef2ff" font-size="14">Healthcare &amp; Wellness · Smart Home/IoT · Autonomous Driving · Industrial IoT · 6G Networks · AR/VR · Robotics</text>
  <text x="712" y="212" text-anchor="middle" fill="#c7d2fe" font-size="12">Real-time inference, on-device decision-making, multi-modal interaction, embodied intelligence</text>
  <text x="180" y="10" fill="none"/>
  <text x="1180" y="170" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">◈ User-Facing ◈</text>

  <!-- Layer 4: Agentic/Cognitive -->
  <rect x="245" y="255" width="935" height="130" rx="12" fill="url(#layer4)" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="712" y="293" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Layer 4 — Agentic &amp; Cognitive Computing</text>
  <text x="712" y="321" text-anchor="middle" fill="#f5f3ff" font-size="14">LLM Agents · Multi-Agent Orchestration · Tool Use / RAG · Chain-of-Thought · Planning &amp; Reasoning</text>
  <text x="712" y="357" text-anchor="middle" fill="#e0d5ff" font-size="12">Context-aware adaptive systems, intent understanding, autonomous task completion</text>
  <text x="1180" y="315" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">◈ Decision Layer ◈</text>

  <!-- Layer 3: Model Efficiency -->
  <rect x="245" y="400" width="935" height="130" rx="12" fill="url(#layer3)" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="712" y="438" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Layer 3 — Model Efficiency &amp; Optimization</text>
  <text x="712" y="466" text-anchor="middle" fill="#ecfeff" font-size="14">Quantization · Pruning · Knowledge Distillation · Speculative Decoding · KV-Cache · LoRA/QLoRA</text>
  <text x="712" y="502" text-anchor="middle" fill="#cffafe" font-size="12">LLMs/SLMs/VLMs · Transformers · CNNs · Mixture of Experts · PEFT</text>
  <text x="1180" y="460" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">◈ Algorithm Layer ◈</text>

  <!-- Layer 2: Runtimes -->
  <rect x="245" y="545" width="935" height="130" rx="12" fill="url(#layer2)" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)"/>
  <text x="712" y="583" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Layer 2 — Runtimes &amp; Frameworks</text>
  <text x="712" y="611" text-anchor="middle" fill="#fefce8" font-size="14">llama.cpp · MLC-LLM · ExecuTorch · MediaPipe · TFLite · CoreML · ONNX Runtime · OpenVINO</text>
  <text x="712" y="647" text-anchor="middle" fill="#fef08a" font-size="12">Inference engines, graph optimizations, memory planners, hardware abstraction</text>
  <text x="1180" y="605" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">◈ Software Layer ◈</text>

  <!-- Layer 1: Hardware -->
  <rect x="245" y="690" width="935" height="130" rx="12" fill="url(#layer1)" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="712" y="728" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Layer 1 — Hardware &amp; Accelerators</text>
  <text x="712" y="756" text-anchor="middle" fill="#fef2f2" font-size="14">NPU · GPU · TPU · FPGA · ASIC · ARM Cortex-M · RISC-V · Qualcomm Hexagon · Apple Neural Engine</text>
  <text x="712" y="792" text-anchor="middle" fill="#fecaca" font-size="12">mW–few Watts · KB–few GB memory · Smartphones · MCUs · Wearables · Gateways</text>
  <text x="1180" y="750" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">◈ Physical Layer ◈</text>
</svg>