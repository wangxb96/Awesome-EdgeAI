<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter></defs>
  <rect width="960" height="620" fill="url(#bg)"/>

  <text x="480" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Six Levels of Edge Intelligence</text>
  <rect x="30" y="60" width="280" height="230" rx="10" fill="#1e293b" stroke="#1d4ed8" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="60" width="280" height="35" rx="10" fill="#1d4ed8"/>
  <rect x="30" y="85" width="280" height="10" fill="#1d4ed8"/>
  <text x="170.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">L1: Cloud-Only</text>
  <text x="45" y="115" fill="#cbd5e1" font-size="11">· All compute in cloud</text>
  <text x="45" y="135" fill="#cbd5e1" font-size="11">· Edge is thin client</text>
  <text x="45" y="155" fill="#cbd5e1" font-size="11">· No local intelligence</text>
  <text x="45" y="175" fill="#cbd5e1" font-size="11">· Typical: AWS ML, GCP AI</text>
  <text x="45" y="195" fill="#cbd5e1" font-size="11">· Example: Cloud ASR</text>
  <text x="45" y="215" fill="#cbd5e1" font-size="11">· Latency: >100ms</text>
  <rect x="335" y="60" width="280" height="230" rx="10" fill="#1e293b" stroke="#0891b2" stroke-width="2" filter="url(#sh)"/>
  <rect x="335" y="60" width="280" height="35" rx="10" fill="#0891b2"/>
  <rect x="335" y="85" width="280" height="10" fill="#0891b2"/>
  <text x="475.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">L2: Cloud-Assisted</text>
  <text x="350" y="115" fill="#cbd5e1" font-size="11">· Cloud trains, edge infers</text>
  <text x="350" y="135" fill="#cbd5e1" font-size="11">· Basic local preprocessing</text>
  <text x="350" y="155" fill="#cbd5e1" font-size="11">· Model compression</text>
  <text x="350" y="175" fill="#cbd5e1" font-size="11">· Typical: TFLite models</text>
  <text x="350" y="195" fill="#cbd5e1" font-size="11">· Example: Visual Wake Words</text>
  <text x="350" y="215" fill="#cbd5e1" font-size="11">· Latency: 10-50ms</text>
  <rect x="640" y="60" width="280" height="230" rx="10" fill="#1e293b" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
  <rect x="640" y="60" width="280" height="35" rx="10" fill="#d97706"/>
  <rect x="640" y="85" width="280" height="10" fill="#d97706"/>
  <text x="780.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">L3: Split Computing</text>
  <text x="655" y="115" fill="#cbd5e1" font-size="11">· DNN partitioned edge↔cloud</text>
  <text x="655" y="135" fill="#cbd5e1" font-size="11">· Early exit on edge</text>
  <text x="655" y="155" fill="#cbd5e1" font-size="11">· Dynamic offloading</text>
  <text x="655" y="175" fill="#cbd5e1" font-size="11">· Typical: Split Learning</text>
  <text x="655" y="195" fill="#cbd5e1" font-size="11">· Example: Adaptive video</text>
  <text x="655" y="215" fill="#cbd5e1" font-size="11">· Latency: 5-30ms</text>
  <rect x="30" y="310" width="280" height="140" rx="10" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="310" width="280" height="35" rx="10" fill="#dc2626"/>
  <rect x="30" y="335" width="280" height="10" fill="#dc2626"/>
  <text x="170.0" y="333" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">L4: Edge-Only</text>
  <text x="45" y="365" fill="#cbd5e1" font-size="11">· Full model on edge device</text>
  <text x="45" y="385" fill="#cbd5e1" font-size="11">· On-device LLM (1B-7B)</text>
  <text x="45" y="405" fill="#cbd5e1" font-size="11">· No cloud dependency</text>
  <text x="45" y="425" fill="#cbd5e1" font-size="11">· Typical: llama.cpp, CoreML</text>
  <text x="45" y="445" fill="#cbd5e1" font-size="11">· Latency: real-time</text>
  <rect x="335" y="310" width="280" height="140" rx="10" fill="#1e293b" stroke="#6d28d9" stroke-width="2" filter="url(#sh)"/>
  <rect x="335" y="310" width="280" height="35" rx="10" fill="#6d28d9"/>
  <rect x="335" y="335" width="280" height="10" fill="#6d28d9"/>
  <text x="475.0" y="333" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">L5: Edge Learning</text>
  <text x="350" y="365" fill="#cbd5e1" font-size="11">· On-device training/fine-tuning</text>
  <text x="350" y="385" fill="#cbd5e1" font-size="11">· PEFT (LoRA) on edge</text>
  <text x="350" y="405" fill="#cbd5e1" font-size="11">· Federated learning</text>
  <text x="350" y="425" fill="#cbd5e1" font-size="11">· Typical: Gboard, federated ASR</text>
  <rect x="640" y="310" width="280" height="140" rx="10" fill="#1e293b" stroke="#15803d" stroke-width="2" filter="url(#sh)"/>
  <rect x="640" y="310" width="280" height="35" rx="10" fill="#15803d"/>
  <rect x="640" y="335" width="280" height="10" fill="#15803d"/>
  <text x="780.0" y="333" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">L6: Cognitive Edge</text>
  <text x="655" y="365" fill="#cbd5e1" font-size="11">· Edge AI Agents + RAG</text>
  <text x="655" y="385" fill="#cbd5e1" font-size="11">· Multi-agent orchestration</text>
  <text x="655" y="405" fill="#cbd5e1" font-size="11">· Tool use, reasoning</text>
  <text x="655" y="425" fill="#cbd5e1" font-size="11">· Embodied edge intelligence</text>
  <rect x="60" y="565" width="840" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-dasharray="4,2"/>
  <text x="480" y="591" text-anchor="middle" fill="#94a3b8" font-size="12">Progression from passive cloud dependency to fully autonomous, cognitive edge agents</text></svg>
