  <rect x="820" y="275" width="225" height="85" rx="8" fill="#0c4a6e"/><text x="932" y="305" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Accuracy-Preserving</text><text x="840" y="228" fill="#94a3b8" font-size="11">· Quantization-aware</text><text x="840" y="248" fill="#94a3b8" font-size="11">· Speculative Decoding</text>

  <rect x="555" y="410" width="515" height="280" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <rect x="555" y="410" width="515" height="44" rx="12" fill="url(#h3)"/><rect x="555" y="440" width="515" height="14" fill="url(#h3)"/>
  <text x="812" y="438" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">By Application Domain</text>
