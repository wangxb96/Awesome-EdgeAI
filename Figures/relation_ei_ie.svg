<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/></filter></defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="480" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Relationship: Edge Intelligence ↔ Intelligent Edge</text>

  <rect x="80" y="90" width="320" height="180" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="3" filter="url(#sh)"/>
  <text x="240" y="130" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="700">Edge Intelligence (EI)</text>
  <text x="105" y="168" fill="#cbd5e1" font-size="13">· AI/ML models running at edge</text>
  <text x="105" y="195" fill="#cbd5e1" font-size="13">· On-device inference & learning</text>
  <text x="105" y="222" fill="#cbd5e1" font-size="13">· Models trained for edge hardware</text>
  <text x="105" y="249" fill="#94a3b8" font-size="11">Focus: Algorithms, models, optimization</text>

  <rect x="560" y="90" width="320" height="180" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="3" filter="url(#sh)"/>
  <text x="720" y="130" text-anchor="middle" fill="#22d3ee" font-size="18" font-weight="700">Intelligent Edge (IE)</text>
  <text x="585" y="168" fill="#cbd5e1" font-size="13">· Network infrastructure with AI</text>
  <text x="585" y="195" fill="#cbd5e1" font-size="13">· Smart resource orchestration</text>
  <text x="585" y="222" fill="#cbd5e1" font-size="13">· 5G/6G MEC, intelligent routing</text>
  <text x="585" y="249" fill="#94a3b8" font-size="11">Focus: Infrastructure, networking, systems</text>

  <!-- Intersection -->
  <rect x="280" y="290" width="400" height="140" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="8,4" filter="url(#sh)"/>
  <text x="480" y="335" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">Intersection: Edge AI</text>
  <text x="305" y="365" fill="#cbd5e1" font-size="12">· AI models deployed on intelligent edge infrastructure</text>
  <text x="305" y="390" fill="#cbd5e1" font-size="12">· Co-designed hardware+software+network for AI</text>
  <text x="305" y="415" fill="#94a3b8" font-size="11">Pervasive, real-time, private, efficient edge intelligence</text>

  <!-- Arrows -->
  <line x1="400" y1="200" x2="560" y2="200" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="480" y="195" text-anchor="middle" fill="#a78bfa" font-size="10">⇄ Co-evolution</text>
  <line x1="480" y1="270" x2="480" y2="290" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3"/>

  <rect x="150" y="460" width="660" height="50" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="480" y="491" text-anchor="middle" fill="#94a3b8" font-size="12">EI provides the intelligence; IE provides the platform. Together, they enable ubiquitous, real-time AI at the edge.</text>
</svg>