  <rect x="260" y="120" width="215" height="660" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#sh)"/>
  <rect x="260" y="120" width="215" height="50" rx="14" fill="url(#modelG)"/>
  <rect x="260" y="155" width="215" height="15" fill="url(#modelG)"/>
  <text x="367" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700"> Model</text>

  <text x="280" y="200" fill="#67e8f9" font-size="12" font-weight="600">Compression</text>
  <text x="280" y="225" fill="#cbd5e1" font-size="10">· Quantization (INT8/INT4/INT2)</text>
  <text x="280" y="245" fill="#cbd5e1" font-size="10">· Pruning (Sparse/Structured)</text>
  <text x="280" y="265" fill="#cbd5e1" font-size="10">· KD (Logit/Feature)</text>
  <text x="280" y="285" fill="#cbd5e1" font-size="10">· Low-Rank Factorization</text>

  <text x="280" y="325" fill="#67e8f9" font-size="12" font-weight="600">NAS / HW-Aware</text>
  <text x="280" y="350" fill="#cbd5e1" font-size="10">· MobileNet · EfficientNet</text>
  <text x="280" y="370" fill="#cbd5e1" font-size="10">· Once-for-All (OFA)</text>
  <text x="280" y="390" fill="#cbd5e1" font-size="10">· AutoML for Edge</text>

  <text x="280" y="430" fill="#67e8f9" font-size="12" font-weight="600">Architecture</text>
  <text x="280" y="455" fill="#cbd5e1" font-size="10">· CNNs (MobileNet, YOLO-Nano)</text>
  <text x="280" y="475" fill="#cbd5e1" font-size="10">· Transformers (MobileBERT)</text>
  <text x="280" y="495" fill="#cbd5e1" font-size="10">· Mamba/SSM · RNN/LSTM</text>

  <text x="280" y="540" fill="#67e8f9" font-size="12" font-weight="600">PEFT / Adaptation</text>
  <text x="280" y="565" fill="#cbd5e1" font-size="10">· LoRA · QLoRA · Adapter</text>
  <text x="280" y="585" fill="#cbd5e1" font-size="10">· Prompt Tuning</text>

  <text x="280" y="630" fill="#67e8f9" font-size="12" font-weight="600">Edge LLM Inference</text>
  <text x="280" y="655" fill="#cbd5e1" font-size="10">· Speculative Decoding</text>
  <text x="280" y="675" fill="#cbd5e1" font-size="10">· KV-Cache Optimization</text>
  <text x="280" y="695" fill="#cbd5e1" font-size="10">· MoE · Sparsity</text>

  <text x="280" y="740" fill="#67e8f9" font-size="12" font-weight="600">VLM / Multi-Modal</text>
  <text x="280" y="765" fill="#cbd5e1" font-size="10">· Phi-3-Vision · MobileVLM</text>

