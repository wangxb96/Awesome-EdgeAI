<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter></defs>
  <rect width="960" height="620" fill="url(#bg)"/>

  <text x="480" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Edge Computing Infrastructure</text>
  <rect x="30" y="60" width="440" height="240" rx="10" fill="#1e293b" stroke="#1d4ed8" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="60" width="440" height="35" rx="10" fill="#1d4ed8"/>
  <rect x="30" y="85" width="440" height="10" fill="#1d4ed8"/>
  <text x="250.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Edge Device Tier</text>
  <text x="45" y="115" fill="#cbd5e1" font-size="11">· MCU/SoC: ARM Cortex-M, RISC-V</text>
  <text x="45" y="135" fill="#cbd5e1" font-size="11">· Smartphones: A17 Pro, Snapdragon 8 Gen 4</text>
  <text x="45" y="155" fill="#cbd5e1" font-size="11">· Wearables: Apple Watch S9, Galaxy Watch</text>
  <text x="45" y="175" fill="#cbd5e1" font-size="11">· IoT Sensors: temperature, motion, camera</text>
  <text x="45" y="195" fill="#cbd5e1" font-size="11">· Smart Speakers: Echo, HomePod, Nest</text>
  <text x="45" y="215" fill="#cbd5e1" font-size="11">· Drones, Robots, AR/VR headsets</text>
  <text x="45" y="235" fill="#cbd5e1" font-size="11">· Compute: 0.1 TOPS → 45 TOPS</text>
  <text x="45" y="255" fill="#cbd5e1" font-size="11">· Memory: 64KB → 8GB</text>
  <rect x="490" y="60" width="440" height="240" rx="10" fill="#1e293b" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
  <rect x="490" y="60" width="440" height="35" rx="10" fill="#d97706"/>
  <rect x="490" y="85" width="440" height="10" fill="#d97706"/>
  <text x="710.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Edge Network Tier</text>
  <text x="505" y="115" fill="#cbd5e1" font-size="11">· 5G NR: eMBB, URLLC, mMTC</text>
  <text x="505" y="135" fill="#cbd5e1" font-size="11">· Wi-Fi 7 (802.11be) — 40 Gbps</text>
  <text x="505" y="155" fill="#cbd5e1" font-size="11">· Bluetooth 5.4, Zigbee, LoRaWAN</text>
  <text x="505" y="175" fill="#cbd5e1" font-size="11">· MEC (Multi-Access Edge Computing)</text>
  <text x="505" y="195" fill="#cbd5e1" font-size="11">· Edge Gateways: K3s, KubeEdge, OpenYurt</text>
  <text x="505" y="215" fill="#cbd5e1" font-size="11">· Network Slicing for AI workloads</text>
  <text x="505" y="235" fill="#cbd5e1" font-size="11">· CDN Edge: Lambda@Edge, CloudFront</text>
  <text x="505" y="255" fill="#cbd5e1" font-size="11">· 6G (2030+): AI-native network layer</text>
  <rect x="30" y="315" width="440" height="120" rx="10" fill="#1e293b" stroke="#0891b2" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="315" width="440" height="35" rx="10" fill="#0891b2"/>
  <rect x="30" y="340" width="440" height="10" fill="#0891b2"/>
  <text x="250.0" y="338" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Edge Cloud / Fog Tier</text>
  <text x="45" y="370" fill="#cbd5e1" font-size="11">· Micro data centers, Fog nodes</text>
  <text x="45" y="390" fill="#cbd5e1" font-size="11">· AWS Outposts, Azure Stack Edge</text>
  <text x="45" y="410" fill="#cbd5e1" font-size="11">· Google Distributed Cloud Edge</text>
  <rect x="490" y="315" width="440" height="120" rx="10" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#sh)"/>
  <rect x="490" y="315" width="440" height="35" rx="10" fill="#dc2626"/>
  <rect x="490" y="340" width="440" height="10" fill="#dc2626"/>
  <text x="710.0" y="338" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Cloud Tier (Backend)</text>
  <text x="505" y="370" fill="#cbd5e1" font-size="11">· Centralized training (GPU clusters)</text>
  <text x="505" y="390" fill="#cbd5e1" font-size="11">· Model registry, orchestration, monitoring</text>
  <text x="505" y="410" fill="#cbd5e1" font-size="11">· AWS/GCP/Azure AI platforms</text>
  <rect x="60" y="565" width="840" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-dasharray="4,2"/>
  <text x="480" y="591" text-anchor="middle" fill="#94a3b8" font-size="12">End-to-end infrastructure: device → network → edge cloud → centralized cloud</text></svg>
