  <rect x="285" y="175" width="215" height="100" rx="8" fill="#1e3a5f"/><text x="392" y="205" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Edge-Only</text><text x="305" y="228" fill="#94a3b8" font-size="11">· TinyML (KB-MB, MCU)</text><text x="305" y="248" fill="#94a3b8" font-size="11">· On-Device LLM/VLM</text><text x="305" y="268" fill="#94a3b8" font-size="11">· Federated Learning</text>
  <rect x="55" y="295" width="215" height="100" rx="8" fill="#1e3a5f"/><text x="162" y="325" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Hierarchical Edge</text><text x="75" y="348" fill="#94a3b8" font-size="11">· End → Gateway → Cloud</text><text x="75" y="368" fill="#94a3b8" font-size="11">· KubeEdge / OpenYurt</text><text x="75" y="388" fill="#94a3b8" font-size="11">· Fog Computing</text>
  <rect x="285" y="295" width="215" height="100" rx="8" fill="#1e3a5f"/><text x="392" y="325" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Agentic / Cognitive</text><text x="305" y="348" fill="#94a3b8" font-size="11">· LLM Agents + RAG</text><text x="305" y="368" fill="#94a3b8" font-size="11">· Multi-Agent Systems</text><text x="305" y="388" fill="#94a3b8" font-size="11">· Embodied Edge AI</text>
