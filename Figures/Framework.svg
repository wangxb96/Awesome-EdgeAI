  <text x="510" y="285" fill="#cbd5e1" font-size="10">· CoreML · OpenVINO</text>

  <text x="510" y="325" fill="#fde68a" font-size="12" font-weight="600">Compiler Stacks</text>
  <text x="510" y="350" fill="#cbd5e1" font-size="10">· TVM · MLIR · XLA</text>
  <text x="510" y="370" fill="#cbd5e1" font-size="10">· GLOW · TensorRT</text>

  <text x="510" y="410" fill="#fde68a" font-size="12" font-weight="600">Memory &amp; Compute</text>
