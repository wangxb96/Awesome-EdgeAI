<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1000" height="750" fill="url(#bg)"/>
  <text x="500" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Model Optimization Techniques for Edge AI</text>

  <!-- Quantization -->
  <rect x="20" y="65" width="460" height="200" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="65" width="460" height="42" rx="12" fill="#1d4ed8"/><rect x="20" y="93" width="460" height="14" fill="#1d4ed8"/>
  <text x="250" y="93" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Quantization</text>
  <text x="45" y="132" fill="#93c5fd" font-size="11" font-weight="600">Methods</text>
  <text x="45" y="155" fill="#94a3b8" font-size="10">· Post-Training Quantization (PTQ)</text>
  <text x="45" y="173" fill="#94a3b8" font-size="10">· Quantization-Aware Training (QAT)</text>
  <text x="45" y="191" fill="#94a3b8" font-size="10">· Weight-Only (AWQ, GPTQ, GGUF)</text>
  <text x="45" y="209" fill="#94a3b8" font-size="10">· Activation-Aware (SmoothQuant)</text>
  <text x="45" y="227" fill="#94a3b8" font-size="10">· Mixed-Precision (INT8/FP16/BF16)</text>
  <text x="300" y="155" fill="#93c5fd" font-size="11" font-weight="600">Bit Widths</text>
  <text x="300" y="173" fill="#94a3b8" font-size="10">· FP32→FP16→INT8→INT4→INT2</text>
  <text x="300" y="191" fill="#94a3b8" font-size="10">· 4-bit: 4-8× memory reduction</text>

  <!-- Pruning -->
  <rect x="500" y="65" width="480" height="200" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2" filter="url(#sh)"/>
  <rect x="500" y="65" width="480" height="42" rx="12" fill="#0e7490"/><rect x="500" y="93" width="480" height="14" fill="#0e7490"/>
  <text x="740" y="93" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Pruning & Sparsity</text>
  <text x="525" y="132" fill="#67e8f9" font-size="11" font-weight="600">Types</text>
  <text x="525" y="155" fill="#94a3b8" font-size="10">· Unstructured (weight-level)</text>
  <text x="525" y="173" fill="#94a3b8" font-size="10">· Structured (channel/block)</text>
  <text x="525" y="191" fill="#94a3b8" font-size="10">· Magnitude-based</text>
  <text x="525" y="209" fill="#94a3b8" font-size="10">· Movement pruning</text>
  <text x="525" y="227" fill="#94a3b8" font-size="10">· Lottery Ticket Hypothesis</text>
  <text x="740" y="155" fill="#67e8f9" font-size="11" font-weight="600">LLM Sparsity</text>
  <text x="740" y="173" fill="#94a3b8" font-size="10">· SparseGPT · Wanda</text>
  <text x="740" y="191" fill="#94a3b8" font-size="10">· MoE (Mixture of Experts)</text>
  <text x="740" y="209" fill="#94a3b8" font-size="10">· 50-95% sparsity achievable</text>

  <!-- Knowledge Distillation -->
  <rect x="20" y="280" width="460" height="200" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="280" width="460" height="42" rx="12" fill="#d97706"/><rect x="20" y="308" width="460" height="14" fill="#d97706"/>
  <text x="250" y="308" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Knowledge Distillation</text>
  <text x="45" y="347" fill="#fde68a" font-size="11" font-weight="600">Teacher→Student</text>
  <text x="45" y="370" fill="#94a3b8" font-size="10">· Logit-based (KL divergence)</text>
  <text x="45" y="388" fill="#94a3b8" font-size="10">· Feature-based (FitNet, AT)</text>
  <text x="45" y="406" fill="#94a3b8" font-size="10">· Relation-based (RKD, VID)</text>
  <text x="45" y="424" fill="#94a3b8" font-size="10">· Self-Distillation</text>
  <text x="300" y="347" fill="#fde68a" font-size="11" font-weight="600">Edge Use</text>
  <text x="300" y="370" fill="#94a3b8" font-size="10">· LLM→Small LM</text>
  <text x="300" y="388" fill="#94a3b8" font-size="10">· Orca, Alpaca method</text>
  <text x="300" y="406" fill="#94a3b8" font-size="10">· 10-50× model reduction</text>
  <text x="300" y="424" fill="#94a3b8" font-size="10">· Preserves reasoning</text>

  <!-- NAS / Architecture -->
  <rect x="500" y="280" width="480" height="200" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <rect x="500" y="280" width="480" height="42" rx="12" fill="#6d28d9"/><rect x="500" y="308" width="480" height="14" fill="#6d28d9"/>
  <text x="740" y="308" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">NAS & HW-Aware Design</text>
  <text x="525" y="347" fill="#c4b5fd" font-size="11" font-weight="600">Edge Architectures</text>
  <text x="525" y="370" fill="#94a3b8" font-size="10">· MobileNet v1–v3</text>
  <text x="525" y="388" fill="#94a3b8" font-size="10">· EfficientNet B0–B7</text>
  <text x="525" y="406" fill="#94a3b8" font-size="10">· ShuffleNet · SqueezeNet</text>
  <text x="525" y="424" fill="#94a3b8" font-size="10">· CondenseNet · GhostNet</text>
  <text x="740" y="347" fill="#c4b5fd" font-size="11" font-weight="600">NAS Search</text>
  <text x="740" y="370" fill="#94a3b8" font-size="10">· Once-for-All (OFA)</text>
  <text x="740" y="388" fill="#94a3b8" font-size="10">· DARTS · ProxylessNAS</text>
  <text x="740" y="406" fill="#94a3b8" font-size="10">· FBNet · MnasNet</text>

  <!-- PEFT + Spec Decoding -->
  <rect x="20" y="495" width="460" height="150" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <rect x="20" y="495" width="460" height="42" rx="12" fill="#dc2626"/><rect x="20" y="523" width="460" height="14" fill="#dc2626"/>
  <text x="250" y="523" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">PEFT (Parameter-Efficient Fine-Tuning)</text>
  <text x="45" y="565" fill="#fca5a5" font-size="11">· LoRA · QLoRA · AdaLoRA · IA3 · Prompt Tuning</text>
  <text x="45" y="590" fill="#94a3b8" font-size="10">· Train 0.1-1% parameters · 4-bit quantization compatible · On-device fine-tuning</text>

  <rect x="500" y="495" width="480" height="150" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <rect x="500" y="495" width="480" height="42" rx="12" fill="#15803d"/><rect x="500" y="523" width="480" height="14" fill="#15803d"/>
  <text x="740" y="523" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Inference Acceleration</text>
  <text x="525" y="565" fill="#86efac" font-size="11">· Speculative Decoding · Medusa · Lookahead · KV-Cache Optim.</text>
  <text x="525" y="590" fill="#94a3b8" font-size="10">· Flash Attention · PagedAttention · FlashInfer · Streaming LLM · H2O</text>

  <!-- Summary -->
  <rect x="120" y="665" width="760" height="55" rx="10" fill="#1e293b" stroke="#475569" stroke-dasharray="4,2"/>
  <text x="500" y="695" text-anchor="middle" fill="#cbd5e1" font-size="12">Combined: Quantization + Pruning + Distillation → 10-100× memory reduction, 2-10× latency improvement, <1% accuracy loss</text>
</svg>