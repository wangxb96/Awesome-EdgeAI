  <text x="510" y="455" fill="#cbd5e1" font-size="10">· Operator Fusion</text>
  <text x="510" y="475" fill="#cbd5e1" font-size="10">· Pipelining</text>

  <text x="510" y="520" fill="#fde68a" font-size="12" font-weight="600">Edge-Cloud Offloading</text>
  <text x="510" y="545" fill="#cbd5e1" font-size="10">· DNN Partitioning</text>
  <text x="510" y="565" fill="#cbd5e1" font-size="10">· Early Exit</text>
  <text x="510" y="585" fill="#cbd5e1" font-size="10">· Ensemble Routing</text>

  <text x="510" y="630" fill="#fde68a" font-size="12" font-weight="600">Hardware</text>
  <text x="510" y="655" fill="#cbd5e1" font-size="10">· NPU · GPU · FPGA · ASIC</text>
  <text x="510" y="675" fill="#cbd5e1" font-size="10">· ARM Cortex-M · RISC-V</text>
  <text x="510" y="695" fill="#cbd5e1" font-size="10">· Qualcomm · Apple ANE</text>

  <text x="510" y="740" fill="#fde68a" font-size="12" font-weight="600">Deployment / CI-CD</text>
  <text x="510" y="765" fill="#cbd5e1" font-size="10">· MLOps for Edge · Docker</text>

