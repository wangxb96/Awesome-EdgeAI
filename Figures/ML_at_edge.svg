<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="960" height="620" fill="url(#bg)"/>

  <text x="480" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Machine Learning at the Edge</text>

  <rect x="30" y="60" width="210" height="200" rx="10" fill="#1e293b" stroke="#1d4ed8" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="60" width="210" height="35" rx="10" fill="#1d4ed8"/>
  <rect x="30" y="85" width="210" height="10" fill="#1d4ed8"/>
  <text x="135.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Training Paradigms</text>
  <text x="45" y="115" fill="#cbd5e1" font-size="11">· Cloud-side training</text>
  <text x="45" y="135" fill="#cbd5e1" font-size="11">· Edge-side fine-tuning</text>
  <text x="45" y="155" fill="#cbd5e1" font-size="11">· Federated Learning</text>
  <text x="45" y="175" fill="#cbd5e1" font-size="11">· Split Learning</text>
  <text x="45" y="195" fill="#cbd5e1" font-size="11">· Transfer Learning</text>
  <text x="45" y="215" fill="#cbd5e1" font-size="11">· Online / Continual</text>
  <rect x="255" y="60" width="210" height="200" rx="10" fill="#1e293b" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
  <rect x="255" y="60" width="210" height="35" rx="10" fill="#d97706"/>
  <rect x="255" y="85" width="210" height="10" fill="#d97706"/>
  <text x="360.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Inference Modes</text>
  <text x="270" y="115" fill="#cbd5e1" font-size="11">· On-device only</text>
  <text x="270" y="135" fill="#cbd5e1" font-size="11">· Edge-assisted (gateway)</text>
  <text x="270" y="155" fill="#cbd5e1" font-size="11">· Cloud-assisted offload</text>
  <text x="270" y="175" fill="#cbd5e1" font-size="11">· Hybrid split inference</text>
  <text x="270" y="195" fill="#cbd5e1" font-size="11">· Cascaded multi-model</text>
  <text x="270" y="215" fill="#cbd5e1" font-size="11">· Speculative execution</text>
  <rect x="480" y="60" width="210" height="200" rx="10" fill="#1e293b" stroke="#0891b2" stroke-width="2" filter="url(#sh)"/>
  <rect x="480" y="60" width="210" height="35" rx="10" fill="#0891b2"/>
  <rect x="480" y="85" width="210" height="10" fill="#0891b2"/>
  <text x="585.0" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Edge Hardware</text>
  <text x="495" y="115" fill="#cbd5e1" font-size="11">· MCU: ARM Cortex-M, RISC-V</text>
  <text x="495" y="135" fill="#cbd5e1" font-size="11">· Mobile: NPU, GPU, DSP</text>
  <text x="495" y="155" fill="#cbd5e1" font-size="11">· Gateway: CPU, FPGA</text>
  <text x="495" y="175" fill="#cbd5e1" font-size="11">· Server: GPU, TPU, ASIC</text>
  <text x="495" y="195" fill="#cbd5e1" font-size="11">· Custom: ASICs (TPU, NPU)</text>
  <text x="495" y="215" fill="#cbd5e1" font-size="11">· Ultra-low: <1mW sensors</text>
  <rect x="705" y="60" width="225" height="200" rx="10" fill="#1e293b" stroke="#dc2626" stroke-width="2" filter="url(#sh)"/>
  <rect x="705" y="60" width="225" height="35" rx="10" fill="#dc2626"/>
  <rect x="705" y="85" width="225" height="10" fill="#dc2626"/>
  <text x="817.5" y="83" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Key Metrics</text>
  <text x="720" y="115" fill="#cbd5e1" font-size="11">· Latency (ms) / Throughput</text>
  <text x="720" y="135" fill="#cbd5e1" font-size="11">· Energy (mJ/inference)</text>
  <text x="720" y="155" fill="#cbd5e1" font-size="11">· Memory (KB–GB)</text>
  <text x="720" y="175" fill="#cbd5e1" font-size="11">· Accuracy (Top-1/5, F1)</text>
  <text x="720" y="195" fill="#cbd5e1" font-size="11">· Power (mW–W)</text>
  <text x="720" y="215" fill="#cbd5e1" font-size="11">· Robustness (noise, drift)</text>
  <rect x="30" y="280" width="440" height="150" rx="10" fill="#1e293b" stroke="#6d28d9" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="280" width="440" height="35" rx="10" fill="#6d28d9"/>
  <rect x="30" y="305" width="440" height="10" fill="#6d28d9"/>
  <text x="250.0" y="303" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Frameworks & Tools</text>
  <text x="45" y="335" fill="#cbd5e1" font-size="11">· TFLite · ExecuTorch · CoreML · ONNX Runtime</text>
  <text x="45" y="355" fill="#cbd5e1" font-size="11">· llama.cpp · MLC-LLM · OpenVINO · TensorRT</text>
  <text x="45" y="375" fill="#cbd5e1" font-size="11">· Edge Impulse · SensiML · Qeexo · Neuton.AI</text>
  <text x="45" y="395" fill="#cbd5e1" font-size="11">· TVM · MLIR · CMSIS-NN · ncnn · MNN</text>
  <rect x="490" y="280" width="440" height="150" rx="10" fill="#1e293b" stroke="#15803d" stroke-width="2" filter="url(#sh)"/>
  <rect x="490" y="280" width="440" height="35" rx="10" fill="#15803d"/>
  <rect x="490" y="305" width="440" height="10" fill="#15803d"/>
  <text x="710.0" y="303" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Applications</text>
  <text x="505" y="335" fill="#cbd5e1" font-size="11">· Wake-word · ASR · Object detection · Face recog.</text>
  <text x="505" y="355" fill="#cbd5e1" font-size="11">· Pose estimation · Gesture · Anomaly detection</text>
  <text x="505" y="375" fill="#cbd5e1" font-size="11">· Healthcare wearables · Industrial predictive maint.</text>
  <text x="505" y="395" fill="#cbd5e1" font-size="11">· Smart home assistants · Autonomous vehicles</text>
  <rect x="60" y="565" width="840" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-dasharray="4,2"/>
  <text x="480" y="591" text-anchor="middle" fill="#94a3b8" font-size="12">The full edge ML lifecycle: training, optimization, deployment, and monitoring</text>
</svg>