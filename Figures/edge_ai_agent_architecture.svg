<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI', -apple-system, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="llm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="tool" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="mem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="plan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="env" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect width="1100" height="780" fill="url(#bg)"/>
  
  <text x="550" y="42" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Edge AI Agent Architecture</text>
  <text x="550" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">Perception → Memory → Planning → Tool Use → Feedback Loop</text>

  <!-- User / Environment Input -->
  <rect x="30" y="120" width="180" height="560" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="120" y="160" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="700">🌐 Environment</text>
  <line x1="60" y1="175" x2="180" y2="175" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <text x="55" y="210" fill="#94a3b8" font-size="12">📱 User Query</text>
  <text x="55" y="245" fill="#94a3b8" font-size="12">🎤 Audio / Voice</text>
  <text x="55" y="280" fill="#94a3b8" font-size="12">📷 Camera Input</text>
  <text x="55" y="315" fill="#94a3b8" font-size="12">📍 Sensor Data</text>
  <text x="55" y="350" fill="#94a3b8" font-size="12">📡 IoT Signals</text>
  <text x="55" y="385" fill="#94a3b8" font-size="12">⌨️ Text / Gesture</text>
  <text x="55" y="420" fill="#94a3b8" font-size="12">🔔 Push Notif.</text>

  <!-- Arrow from Env to Core -->
  <line x1="210" y1="400" x2="245" y2="400" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Core Agent Box -->
  <rect x="245" y="120" width="610" height="560" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="8,4" filter="url(#sh)"/>
  <text x="550" y="150" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="700">Edge AI Agent Core</text>

  <!-- LLM Core -->
  <rect x="270" y="175" width="265" height="200" rx="12" fill="url(#llm)" filter="url(#sh)"/>
  <text x="402" y="208" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">🧠 LLM / SLM Engine</text>
  <text x="290" y="242" fill="#ede9fe" font-size="11">· Llama 3.2 · Phi-3 · Gemma</text>
  <text x="290" y="265" fill="#ede9fe" font-size="11">· Qwen2 · Mistral · DeepSeek</text>
  <text x="290" y="288" fill="#ede9fe" font-size="11">· Speculative Decoding</text>
  <text x="290" y="311" fill="#ede9fe" font-size="11">· 4-bit / GGUF Quantization</text>
  <text x="290" y="334" fill="#ede9fe" font-size="11">· Flash Attention</text>
  <text x="290" y="357" fill="#ede9fe" font-size="11">· Prompt Processing</text>

  <!-- Planning -->
  <rect x="560" y="175" width="270" height="200" rx="12" fill="url(#plan)" filter="url(#sh)"/>
  <text x="695" y="208" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">🧩 Planning & Reasoning</text>
  <text x="580" y="242" fill="#fee2e2" font-size="11">· Chain-of-Thought (CoT)</text>
  <text x="580" y="265" fill="#fee2e2" font-size="11">· ReAct Loop</text>
  <text x="580" y="288" fill="#fee2e2" font-size="11">· Tree-of-Thought</text>
  <text x="580" y="311" fill="#fee2e2" font-size="11">· Graph-of-Thought</text>
  <text x="580" y="334" fill="#fee2e2" font-size="11">· Task Decomposition</text>
  <text x="580" y="357" fill="#fee2e2" font-size="11">· Priority Queue</text>

  <!-- LLM → Planning Arrow -->
  <line x1="535" y1="275" x2="555" y2="275" stroke="#f97316" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Memory -->
  <rect x="270" y="395" width="265" height="140" rx="12" fill="url(#mem)" filter="url(#sh)"/>
  <text x="402" y="428" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">💾 Memory & RAG</text>
  <text x="290" y="465" fill="#fef3c7" font-size="11">· Vector DB (Chroma, Qdrant)</text>
  <text x="290" y="488" fill="#fef3c7" font-size="11">· Short-term / Long-term Memory</text>
  <text x="290" y="511" fill="#fef3c7" font-size="11">· Context Window Management</text>

  <!-- Tool Use -->
  <rect x="560" y="395" width="270" height="140" rx="12" fill="url(#tool)" filter="url(#sh)"/>
  <text x="695" y="428" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">🔧 Tool Use</text>
  <text x="580" y="465" fill="#cffafe" font-size="11">· Function Calling</text>
  <text x="580" y="488" fill="#cffafe" font-size="11">· API Integration</text>
  <text x="580" y="511" fill="#cffafe" font-size="11">· Code Interpreter</text>

  <!-- Feedback Loop -->
  <rect x="270" y="555" width="560" height="100" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2" filter="url(#sh)"/>
  <text x="550" y="590" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">🔄 Feedback & Refinement</text>
  <text x="550" y="618" text-anchor="middle" fill="#94a3b8" font-size="11">Verify Output → Self-Critique → Adjust Plan → Retry → Ground Truth Validation</text>
  <text x="550" y="642" text-anchor="middle" fill="#94a3b8" font-size="11">Metrics: Quality Score, Hallucination Rate, Task Completion Rate, Latency</text>

  <!-- Memory → Feedback -->
  <line x1="402" y1="535" x2="402" y2="550" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- Tools → Feedback -->
  <line x1="695" y1="535" x2="695" y2="550" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Action Output -->
  <rect x="870" y="200" width="200" height="340" rx="14" fill="#0f172a" stroke="#ec4899" stroke-width="2"/>
  <text x="970" y="235" text-anchor="middle" fill="#f472b6" font-size="14" font-weight="700">📤 Actions</text>
  <text x="890" y="275" fill="#94a3b8" font-size="11">✅ Execute Task</text>
  <text x="890" y="310" fill="#94a3b8" font-size="11">💬 Generate Response</text>
  <text x="890" y="345" fill="#94a3b8" font-size="11">📊 Query Database</text>
  <text x="890" y="380" fill="#94a3b8" font-size="11">📱 Control Device</text>
  <text x="890" y="415" fill="#94a3b8" font-size="11">📡 Publish Message</text>
  <text x="890" y="450" fill="#94a3b8" font-size="11">🖼️ Render UI</text>
  <text x="890" y="485" fill="#94a3b8" font-size="11">⏸️ Wait & Listen</text>

  <!-- Arrow to Actions -->
  <line x1="830" y1="370" x2="865" y2="370" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Deployment bar -->
  <rect x="30" y="700" width="1040" height="55" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="725" text-anchor="middle" fill="#cbd5e1" font-size="13">Deployment: Mobile 📱 | Wearables ⌚ | Smart Home 🏠 | Gateway 🖥️ | Vehicle 🚗 | MCU ⚙️</text>
  <text x="550" y="746" text-anchor="middle" fill="#64748b" font-size="10">Runtimes: llama.cpp · ExecuTorch · MLC-LLM · CoreML · ONNX Runtime · TensorRT</text>
</svg>