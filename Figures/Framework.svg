  <text x="740" y="245" fill="#cbd5e1" font-size="10">· Gemma · Qwen2</text>
  <text x="740" y="265" fill="#cbd5e1" font-size="10">· Mistral · DeepSeek</text>
  <text x="740" y="285" fill="#cbd5e1" font-size="10">· TinyLlama · MobileLLM</text>

  <text x="740" y="330" fill="#fca5a5" font-size="12" font-weight="600">On-Device Optimization</text>
  <text x="740" y="355" fill="#cbd5e1" font-size="10">· AWQ · GPTQ · GGUF</text>
  <text x="740" y="375" fill="#cbd5e1" font-size="10">· 4-bit / 2-bit Inference</text>
  <text x="740" y="395" fill="#cbd5e1" font-size="10">· Flash Attention</text>

  <text x="740" y="440" fill="#fca5a5" font-size="12" font-weight="600">VLM on Device</text>
  <text x="740" y="465" fill="#cbd5e1" font-size="10">· MobileVLM · Qwen2-VL</text>
  <text x="740" y="485" fill="#cbd5e1" font-size="10">· Phi-3-Vision</text>

  <text x="740" y="535" fill="#fca5a5" font-size="12" font-weight="600">Decoding Strategies</text>
  <text x="740" y="560" fill="#cbd5e1" font-size="10">· Speculative Decoding</text>
  <text x="740" y="580" fill="#cbd5e1" font-size="10">· Medusa · Lookahead</text>
  <text x="740" y="600" fill="#cbd5e1" font-size="10">· Mixture-of-Experts</text>

  <text x="740" y="650" fill="#fca5a5" font-size="12" font-weight="600">Evaluation</text>
  <text x="740" y="675" fill="#cbd5e1" font-size="10">· Perplexity · MMLU</text>
  <text x="740" y="695" fill="#cbd5e1" font-size="10">· HumanEval · IFEval</text>

  <text x="740" y="745" fill="#fca5a5" font-size="12" font-weight="600">Safety &amp; Alignment</text>
  <text x="740" y="770" fill="#cbd5e1" font-size="10">· RLHF · Guardrails</text>

  <!-- Pillar 5: Agents -->
  <rect x="950" y="120" width="220" height="660" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <rect x="950" y="120" width="220" height="50" rx="14" fill="url(#agentG)"/>
  <rect x="950" y="155" width="220" height="15" fill="url(#agentG)"/>
  <text x="1060" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700"> Agents</text>

  <text x="970" y="200" fill="#c4b5fd" font-size="12" font-weight="600">Agent Architectures</text>
  <text x="970" y="225" fill="#cbd5e1" font-size="10">· ReAct · AutoGPT · CrewAI</text>
  <text x="970" y="245" fill="#cbd5e1" font-size="10">· LangChain · Semantic Kernel</text>

  <text x="970" y="290" fill="#c4b5fd" font-size="12" font-weight="600">Multi-Agent</text>
  <text x="970" y="315" fill="#cbd5e1" font-size="10">· MetaGPT · AutoGen</text>
  <text x="970" y="335" fill="#cbd5e1" font-size="10">· Swarm Intelligence</text>

  <text x="970" y="380" fill="#c4b5fd" font-size="12" font-weight="600">Tool Use &amp; RAG</text>
  <text x="970" y="405" fill="#cbd5e1" font-size="10">· Function Calling</text>
  <text x="970" y="425" fill="#cbd5e1" font-size="10">· Vector DB (Chroma)</text>
  <text x="970" y="445" fill="#cbd5e1" font-size="10">· LlamaIndex</text>

  <text x="970" y="490" fill="#c4b5fd" font-size="12" font-weight="600">Planning &amp; Reasoning</text>
  <text x="970" y="515" fill="#cbd5e1" font-size="10">· Chain-of-Thought</text>
  <text x="970" y="535" fill="#cbd5e1" font-size="10">· Tree-of-Thought</text>
  <text x="970" y="555" fill="#cbd5e1" font-size="10">· Graph-of-Thought</text>

  <text x="970" y="600" fill="#c4b5fd" font-size="12" font-weight="600">Cognitive Edge</text>
  <text x="970" y="625" fill="#cbd5e1" font-size="10">· Adaptive Policies</text>
  <text x="970" y="645" fill="#cbd5e1" font-size="10">· Continual Learning</text>
  <text x="970" y="665" fill="#cbd5e1" font-size="10">· Context-Aware</text>
  <text x="970" y="685" fill="#cbd5e1" font-size="10">· Embodied AI</text>

  <text x="970" y="730" fill="#c4b5fd" font-size="12" font-weight="600">Mobile / IoT Agents</text>
  <text x="970" y="755" fill="#cbd5e1" font-size="10">· Apple Intelligence</text>
  <text x="970" y="775" fill="#cbd5e1" font-size="10">· Samsung Galaxy AI</text>

  <!-- Bottom note -->
  <text x="600" y="830" text-anchor="middle" fill="#64748b" font-size="11">Comprehensive taxonomy covering the full stack — data, model, system, LLM/VLM, and agentic layers — as of 2024–2026 literature</text>
</svg>